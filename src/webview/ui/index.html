<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoHit API Tester</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h1>GoHit API Tester</h1>

    <div class="section">
      <div class="form-group">
        <label>Environment</label>
        <select id="environment">
          <option value="local">Local</option>
        </select>
      </div>

      <div class="form-group">
        <label>Base URL</label>
        <input type="text" id="baseUrl" placeholder="http://localhost:8080" />
      </div>

      <div class="inline-group">
        <div class="form-group inline-group-method">
          <label>Method</label>
          <div class="custom-select" id="method-select">
            <div class="custom-select-trigger">
              <span id="selected-method">POST</span>
              <svg width="12" height="8" viewBox="0 0 12 8" fill="currentColor">
                <path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>
            </div>
            <div class="custom-select-options hidden">
              <div class="custom-select-option" data-value="GET">GET</div>
              <div class="custom-select-option selected" data-value="POST">POST</div>
              <div class="custom-select-option" data-value="PUT">PUT</div>
              <div class="custom-select-option" data-value="PATCH">PATCH</div>
              <div class="custom-select-option" data-value="DELETE">DELETE</div>
              <div class="custom-select-option" data-value="OPTIONS">OPTIONS</div>
              <div class="custom-select-option" data-value="HEAD">HEAD</div>
            </div>
          </div>
          <input type="hidden" id="method" value="POST">
        </div>

        <div class="form-group inline-group-url">
          <label>URL</label>
          <div class="autocomplete-container">
            <input type="text" id="url" placeholder="/api/endpoint" autocomplete="off" />
            <div id="autocomplete-suggestions" class="autocomplete-suggestions hidden"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Headers</div>
      <div class="headers-container" id="headers-container">
        <div class="header-row">
          <input type="text" placeholder="Key" class="header-key" />
          <input type="text" placeholder="Value" class="header-value" />
          <button class="remove-btn" onclick="removeHeader(this)">Remove</button>
        </div>
      </div>
      <button class="secondary-button add-header-btn" onclick="addHeader()">+ Add Header</button>
    </div>

    <div class="section">
      <div class="section-title">Request Body (JSON)</div>
      <textarea id="body" placeholder='{
  "key": "value"
}'></textarea>
    </div>

    <button class="primary-button" id="send-btn" onclick="sendRequest()">
      Send Request
    </button>

    <div class="response-section hidden" id="response-section">
      <div class="section-title">Response</div>

      <div id="error-container" class="hidden">
        <div class="error-message" id="error-message"></div>
      </div>

      <div class="response-status">
        <span class="status-code" id="status-code">200 OK</span>
        <span class="response-time" id="response-time">123ms</span>
      </div>

      <div class="response-body">
        <pre id="response-body"></pre>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
